# Mini 4WD - WordPress 開発/運用環境
# 使い方は README.md を参照
# ポートは衝突しにくい 27xxx 帯を使用（.env で変更可）

services:
  # ─────────────────────────────────────────────
  # データベース (MySQL 8.4 LTS)
  # ─────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: mini4wd-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # WordPress (PHP 8.3 + Apache)
  # ─────────────────────────────────────────────
  wordpress:
    image: wordpress:php8.3-apache
    container_name: mini4wd-wordpress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG}
      # サイトURLを固定（ポート変更時は .env を直して再起動）
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:${WORDPRESS_PORT}');
        define('WP_SITEURL', 'http://localhost:${WORDPRESS_PORT}');
    volumes:
      # WordPress 本体は名前付きボリュームで永続化（運用向け）
      - wp_data:/var/www/html
      # 送信メールを MailHog に流す mu-plugin だけホストから注入
      - ./wordpress/mu-plugins:/var/www/html/wp-content/mu-plugins
      # カスタムテーマをホストから編集可能にマウント（バージョン管理対象）
      - ./wordpress/themes/mini4wd:/var/www/html/wp-content/themes/mini4wd

  # ─────────────────────────────────────────────
  # MailHog (送信メールのキャプチャ / 確認用)
  #   arm64 ネイティブimageが無いため amd64 をエミュレーション
  # ─────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mini4wd-mailhog
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "${MAILHOG_PORT}:8025"   # Web UI（SMTP 1025 は内部ネットワークのみ）

volumes:
  db_data:
  wp_data:
