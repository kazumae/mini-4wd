name: Deploy to Lightsail

# main にマージ/プッシュされたら Lightsail に SSH して反映
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/mini-4wd
            git fetch --prune origin
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml up -d --build
            # Caddyfile は volume マウントのため、設定変更を reload で反映（失敗時は restart）
            docker compose -f docker-compose.prod.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || docker compose -f docker-compose.prod.yml restart caddy
            docker image prune -f
