name: Deploy to Lightsail

# main にマージ/プッシュされたら Lightsail に SSH して反映
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/mini-4wd
            git fetch --prune origin
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml up -d --build
            # Caddyfile はファイル単位の bind mount のため、git更新で inode が変わると reload では反映されない。
            # caddy のみ force-recreate して Caddyfile の変更を確実に反映する（証明書は named volume で保持）。
            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps caddy
            docker image prune -f
